<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Project Find Rocky banner</title>
  <desc id="desc">A dark science-fiction banner with glowing stars and the title Project Find Rocky.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07121f" />
      <stop offset="45%" stop-color="#0f2740" />
      <stop offset="100%" stop-color="#26140c" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#75f7d5" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#75f7d5" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#75f7d5" stop-opacity="0" />
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="910" cy="165" r="185" fill="url(#glow)" />
  <circle cx="935" cy="188" r="16" fill="#b8fff0" filter="url(#softGlow)" />

  <g fill="#f8f4d5" opacity="0.92">
    <circle cx="120" cy="95" r="2" />
    <circle cx="202" cy="180" r="1.5" />
    <circle cx="330" cy="110" r="2.2" />
    <circle cx="510" cy="88" r="1.6" />
    <circle cx="615" cy="140" r="2.4" />
    <circle cx="740" cy="92" r="1.3" />
    <circle cx="1010" cy="98" r="1.9" />
    <circle cx="1095" cy="130" r="2.1" />
    <circle cx="140" cy="255" r="1.7" />
    <circle cx="288" cy="272" r="1.2" />
    <circle cx="870" cy="315" r="1.6" />
    <circle cx="1050" cy="268" r="1.4" />
    <circle cx="990" cy="402" r="2.3" />
  </g>

  <g stroke="#79efd4" stroke-opacity="0.8" stroke-width="2" fill="none">
    <path d="M136 494h364" />
    <path d="M692 494h365" />
    <path d="M605 447l-17 47h34z" />
    <path d="M612 494c60-92 118-151 179-180" opacity="0.4" />
  </g>

  <text x="135" y="250" fill="#8fd7ff" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="30" letter-spacing="7">
    SIGNAL INTERCEPT
  </text>
  <text x="135" y="340" fill="#ffffff" font-family="'Space Grotesk', 'Segoe UI', sans-serif" font-size="92" font-weight="700">
    Project Find Rocky
  </text>
  <text x="138" y="398" fill="#f2c089" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="30" letter-spacing="2">
    FOLLOW THE FILES. TRACE THE VOICE. BRING HIM HOME.
  </text>
</svg>
