  <circle cx="760" cy="131" r="122" fill="url(#flash)" opacity="0.98" />
  <circle cx="760" cy="131" r="178" fill="url(#flash)" opacity="0.18" />

  <g transform="translate(58 42)">
    <g transform="rotate(-8 112 84)">
      <rect x="16" y="6" width="170" height="170" rx="20" fill="#252525" stroke="#080808" stroke-width="4"/>
      <rect x="114" y="-8" width="52" height="42" rx="4" fill="#efefef" stroke="#080808" stroke-width="4"/>
      <rect x="129" y="5" width="18" height="15" fill="#4a4a4a"/>
