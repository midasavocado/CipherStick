<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 262" role="img" aria-labelledby="title desc">
  <title id="title">Project Find Rocky banner</title>
  <desc id="desc">A rainbow burst banner for the CipherStick Project Find Rocky challenge.</desc>
  <defs>
    <radialGradient id="flash" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="11%" stop-color="#fff9f9" />
      <stop offset="21%" stop-color="#f4b4d4" />
      <stop offset="32%" stop-color="#f6ca6a" />
      <stop offset="45%" stop-color="#ea5e20" />
      <stop offset="62%" stop-color="#08d8ff" />
      <stop offset="78%" stop-color="#0e5fe3" />
      <stop offset="100%" stop-color="#04070c" />
