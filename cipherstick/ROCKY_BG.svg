      <stop offset="28%" stop-color="#f3c66b" />
      <stop offset="42%" stop-color="#ef6a24" />
      <stop offset="58%" stop-color="#13d0ff" />
      <stop offset="72%" stop-color="#1467e4" />
      <stop offset="86%" stop-color="#0b2c49" />
